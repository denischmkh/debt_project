name: Continuous Deployment

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Webhook via Curl
        env:
          GH_SECRET: ${{ secrets.GH_SECRET }}
          WEBHOOK_URL: "https://denys-personal-source.space/deploy"
        run: |
          # Формируем полезную нагрузку (payload)
          PAYLOAD='{"ref": "${{ github.ref }}", "repository": "${{ github.repository }}"}'
          
          # Вычисляем подпись HMAC-SHA256 (как это делает GitHub)
          SIGNATURE=$(echo -n "$PAYLOAD" | openssl dgst -sha256 -hmac "$GH_SECRET" | sed 's/^.* //')
          
          # Отправляем запрос с правильным заголовком
          curl -X POST "$WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -H "X-Hub-Signature-256: sha256=$SIGNATURE" \
            -d "$PAYLOAD"
